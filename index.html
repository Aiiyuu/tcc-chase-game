<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCC Chase Game</title>

  <!--  Link custom fonts  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link
    href="https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@100..900&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles/main.css" />
</head>
<!-- #endregion -->

  <div class="header__sun"></div>
  <div class="header__tree header__tree--1"></div>
  <div class="header__tree header__tree--2"></div>
  <div class="header__grass"></div>
  <div class="header__road"></div>
  <div class="header__motorcycle"></div>
  <div class="header__motorcycle-dust"></div>
</header>

<main class="main fixed">
  <section class="shop">
    <img class="shop__junk" src="./assets/images/junk.svg" alt="junk">

    <img class="shop__tentacles-car" src="./assets/images/car.svg" alt="car">
    <img class="shop__tentacles" src="./assets/images/tentacles.svg" alt="tentacles">

    <div class="shop__road"></div>

    <div class="shop__motorcycle"></div>

    <div class="shop__navigation-wrapper">
      <div class="shop__navigation-nav">
        <div class="shop__price">
          <img class="shop__coin-icon" src="./assets/sprites/player/coin.png" alt="coins">
          <span id="coin-counter" class="shop__price-counter">0</span>
        </div>

        <div class="add">
          <a class="stretch-link" target="_blank" href="https://aiiyuu.github.io/Astro-Blaster/"></a>

          <h4 class="add__text">Also try AstroBlaster</h4>
          <img class="add__spaceship" src="./assets/images/spaceship.png" alt="spaceship">
          <img class="add__planet" src="./assets/images/planet.png" alt="planet">
        </div>
      </div>

      <div class="shop__navigation">
        <ul class="shop__navigation-list">
          <li class="shop__navigation-item">
            <img class="shop__coin-icon" src="./assets/sprites/player/coin.png" alt="coins">
            <span id="price-counter" class="shop__coin-counter">0</span>
           </li>
          <li class="shop__navigation-item">
            <button id="purchase-button" class="button button--purchase">Unlock</button>
          </li>
          <li class="shop__navigation-item">
            <button id="start-game" class="button button--start-game">start game</button>
          </li>
        </ul>
      </div>
    </div>
  </section>
</main>

<div class="mouse">
  <svg
    width="36"
    height="37"
    viewBox="0 0 36 37"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
  >
    <g id="mouse" clip-path="url(#clip0_101_148)">
      <rect
        id="mouse2"
        x="16.8777"
        y="6.85474"
        width="2.23413"
        height="6.78271"
        rx="1"
        fill="#FFE6E1"
      />
      <rect
        id="mouse-scroll"
        x="7.9"
        y="1.28135"
        width="20.2"
        height="33.7"
        rx="10.1"
        stroke="#FFE6E1"
        stroke-width="2.3"
      />
    </g>
    <defs>
      <clipPath id="clip0_101_148">
        <rect
          width="36"
          height="36"
          fill="white"
          transform="translate(0 0.131348)"
        />
      </clipPath>
    </defs>
  </svg>
</div>

<div id="game"></div>

<div class="ribbons">
  <ul class="ribbons__list">
    <li class="ribbons__item"></li>
    <li class="ribbons__item"></li>
    <li class="ribbons__item"></li>
    <li class="ribbons__item"></li>
    <li class="ribbons__item"></li>
  </ul>
</div>

<div class="loading">
  <div class="loading__inner">
    <div class="loading__ball"></div>
    <div class="loading__text">loading...</div>
  </div>
</div>

<script type="module" src="./scripts/index.js"></script>
<script type="module" src="./website/index.js"></script>
</body>
</html>
